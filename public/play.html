<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f6bf27">
  <title>ส่งหัวใจ | Roddonjai Day 2026</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon_1-32.png">
  <link rel="icon" type="image/png" sizes="57x57" href="./assets/favicon_1-57.png">
  <link rel="icon" type="image/png" sizes="76x76" href="./assets/favicon_1-76.png">
  <link rel="icon" type="image/png" sizes="96x96" href="./assets/favicon_1-96.png">
  <link rel="icon" type="image/png" sizes="128x128" href="./assets/favicon_1-128.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/favicon_1-192.png">
  <link rel="icon" type="image/png" sizes="228x228" href="./assets/favicon_1-228.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./assets/favicon_1-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="play-page">
  <main class="play-shell">
    <header class="play-header">
      <div class="mini-brand"><span class="mini-logo"><img src="./assets/rdj-logo.svg" alt="Roddonjai Certified"></span></div>
      <div class="play-header-actions">
        <button id="music-toggle" class="music-toggle" type="button" aria-label="เปิดหรือปิดเพลงพื้นหลัง" title="เพลงพื้นหลัง">♪</button>
        <div id="connection" class="connection"><i></i> พร้อมเล่น</div>
      </div>
    </header>

    <section class="play-content">
      <h1 class="collaboration-title">
        <span class="collaboration-kicker">TOGETHER, WE DRIVE QUALITY USED CARS FORWARD</span>
        <span>รวมพลังทุกหัวใจ</span>
        <strong>ขับเคลื่อนรถมือสอง<br>คุณภาพไปข้างหน้า</strong>
      </h1>
      <p>สะสมหัวใจพร้อมเสียงสนุกได้สูงสุด 500 ดวง</p>

      <button id="heart-button" class="heart-button heart-logo-button" aria-label="แตะเพื่อส่งหัวใจ">
        <img class="heart-button-logo" src="./assets/logo-rdj-heart-removebg-preview.png" alt="">
        <span class="tap-label">แตะเพื่อส่ง</span>
      </button>

      <div id="speed-level" class="speed-level level-1" aria-live="polite">
        <span class="speed-bars"><i></i><i></i><i></i><i></i></span>
        <strong>จังหวะปกติ</strong>
      </div>

      <div class="progress-card">
        <div class="progress-copy"><span>คลิกเพื่อแสดงความร่วมมือ</span><strong><b id="count">0</b> / 500</strong></div>
        <div class="progress-track"><span id="progress"></span></div>
      </div>
    </section>
  </main>
  <div id="burst-layer" class="burst-layer" aria-hidden="true"></div>
  <audio id="background-music" src="./assets/event-background.mp3" loop preload="metadata"></audio>
  <script src="./background-audio.js"></script>
  <script src="./play.js"></script>
</body>
</html>
