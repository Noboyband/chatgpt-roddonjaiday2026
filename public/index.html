<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roddonjai Day 2026 | Live Stage</title>
  <meta name="description" content="ร่วมส่งหัวใจให้ Roddonjai Day 2026 แบบเรียลไทม์">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon_1-32.png">
  <link rel="icon" type="image/png" sizes="57x57" href="./assets/favicon_1-57.png">
  <link rel="icon" type="image/png" sizes="76x76" href="./assets/favicon_1-76.png">
  <link rel="icon" type="image/png" sizes="96x96" href="./assets/favicon_1-96.png">
  <link rel="icon" type="image/png" sizes="128x128" href="./assets/favicon_1-128.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/favicon_1-192.png">
  <link rel="icon" type="image/png" sizes="228x228" href="./assets/favicon_1-228.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./assets/favicon_1-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="stage-page">
  <main class="stage-shell">
    <header class="stage-header">
      <div class="brand-lockup">
        <div class="brand-mark"><img src="./assets/rdj-logo.svg" alt="Roddonjai Certified"></div>
      </div>
      <div class="stage-header-actions">
        <button id="music-toggle" class="music-toggle" type="button" aria-label="เปิดหรือปิดเพลงพื้นหลัง" title="เพลงพื้นหลัง">♪</button>
        <div class="live-pill"><span></span> LIVE 2026</div>
      </div>
    </header>

    <section class="stage-content">
      <div class="hero-copy">
        <p class="eyebrow">TOGETHER, WE DRIVE QUALITY USED CARS FORWARD</p>
        <h2>รวมพลังทุกหัวใจ<br><strong>ขับเคลื่อนรถมือสอง<br>คุณภาพไปข้างหน้า</strong></h2>
        <p class="supporting">สแกน QR Code แล้วสนุกกับหัวใจและเสียงเอฟเฟกต์บนมือถือ</p>
      </div>

      <aside class="qr-panel">
        <div class="scan-badge">สแกนเพิ่มเริ่ม</div>
        <div class="qr-frame"><img src="./assets/play-qr.png" alt="QR Code สำหรับร่วมส่งหัวใจ"></div>
        <p>หัวใจและเสียงสนุกจะแสดงบนมือถือของคุณ</p>
      </aside>
    </section>
  </main>
  <audio id="background-music" src="./assets/event-background.mp3" loop preload="metadata"></audio>
  <script src="./background-audio.js"></script>
</body>
</html>
