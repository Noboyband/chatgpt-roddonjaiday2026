<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roddonjai Day 2026 | Live Stage</title>
  <meta name="description" content="ร่วมส่งหัวใจให้ Roddonjai Day 2026 แบบเรียลไทม์">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="stage-page">
  <main class="stage-shell">
    <header class="stage-header">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true"><span>R</span></div>
        <div>
          <p class="event-label">RODDONJAI DAY</p>
          <h1>ส่งใจไปด้วยกัน</h1>
        </div>
      </div>
      <div class="live-pill"><span></span> LIVE 2026</div>
    </header>

    <section class="stage-content">
      <div class="hero-copy">
        <p class="eyebrow">TOGETHER, WE DRIVE QUALITY USED CARS FORWARD</p>
        <h2>รวมพลังทุกหัวใจ<br><strong>ขับเคลื่อนรถมือสอง<br>คุณภาพไปข้างหน้า</strong></h2>
        <p class="supporting">สแกน QR Code แล้วสนุกกับหัวใจและเสียงเอฟเฟกต์บนมือถือ</p>
      </div>

      <aside class="qr-panel">
        <div class="scan-badge">สแกนเพิ่มเริ่ม</div>
        <div class="qr-frame"><img src="./assets/play-qr.png" alt="QR Code สำหรับร่วมส่งหัวใจ"></div>
        <p>หัวใจและเสียงสนุกจะแสดงบนมือถือของคุณ</p>
      </aside>
    </section>
  </main>
</body>
</html>
