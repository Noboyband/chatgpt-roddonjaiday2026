<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f6bf27">
  <title>ส่งหัวใจ | Roddonjai Day 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="play-page">
  <main class="play-shell">
    <header class="play-header">
      <div class="mini-brand"><span class="mini-logo"><img src="./assets/rdj-logo.svg" alt="Roddonjai Certified"></span></div>
      <div class="play-header-actions">
        <button id="music-toggle" class="music-toggle" type="button" aria-label="เปิดหรือปิดเพลงพื้นหลัง" title="เพลงพื้นหลัง">♪</button>
        <div id="connection" class="connection"><i></i> พร้อมเล่น</div>
      </div>
    </header>

    <section class="play-content">
      <p class="event-theme-line">TOGETHER, WE DRIVE QUALITY USED<br>CARS FORWARD</p>
      <p class="eyebrow">RODDONJAI DAY 2026</p>
      <h1 class="collaboration-title">ส่งใจแสดง<br>ความร่วมมือ</h1>
      <h2 class="project-title">เพื่อขับเคลื่อนความสำเร็จ โครงการ<br><span>Joint Inspection Standard</span></h2>
      <p>สะสมหัวใจพร้อมเสียงสนุกได้สูงสุด 1,000 ดวง</p>

      <button id="heart-button" class="heart-button" aria-label="ส่งหัวใจ">
        <span class="pulse-ring"></span>
        <span class="heart-symbol">♥</span>
        <span class="tap-label">แตะเพื่อส่ง</span>
      </button>

      <div id="speed-level" class="speed-level level-1" aria-live="polite">
        <span class="speed-bars"><i></i><i></i><i></i><i></i></span>
        <strong>จังหวะปกติ</strong>
      </div>

      <div class="progress-card">
        <div class="progress-copy"><span>คลิกเพื่อแสดงความร่วมมือ</span><strong><b id="count">0</b> / 1,000</strong></div>
        <div class="progress-track"><span id="progress"></span></div>
      </div>
    </section>
  </main>
  <div id="burst-layer" class="burst-layer" aria-hidden="true"></div>
  <audio id="background-music" src="./assets/event-background.mp3" loop preload="metadata"></audio>
  <script src="./background-audio.js"></script>
  <script src="./play.js"></script>
</body>
</html>
